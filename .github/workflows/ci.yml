# CI workflow — lint, typecheck, test, build.
# Security note: this workflow uses NO untrusted inputs (no github.event.* interpolation
# in run: blocks). All steps use trusted action versions and bun script entry points only.
# Reviewed against https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Belt-and-braces: opt every action into Node.js 24 ahead of the June 2026
# deadline so the deprecation warning never appears.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
