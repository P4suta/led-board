# Deploy the built PWA to GitHub Pages on push to main.
# Security note: this workflow uses NO untrusted inputs (no github.event.* in run: blocks).
# All steps use trusted action versions and bun script entry points only.
# Reviewed against https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Force JavaScript actions to run on Node.js 24 — silences the deprecation
# warning that fires for transitive dependencies of actions/upload-pages-artifact
# which still pin upload-artifact at a SHA built on Node 20 (as of April 2026).
# Once GitHub publishes a refreshed upload-pages-artifact this can be removed.
# Reference: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
