# Deploy the built PWA to GitHub Pages on push to main.
# Security note: this workflow uses NO untrusted inputs (no github.event.* in run: blocks).
# All steps use trusted action versions and bun script entry points only.
# Reviewed against https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Inline the upload-pages-artifact logic so we can pin upload-artifact
      # to v7 (Node.js 24) directly. Otherwise upload-pages-artifact@v4
      # transitively pulls in upload-artifact@v4.6.2 which is Node.js 20.
      # The tar layout matches what upload-pages-artifact would produce.
      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory packages/web/dist \
            --exclude=.git \
            --exclude=.github \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            .
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
